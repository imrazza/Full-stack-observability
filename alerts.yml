groups:
- name: observability-alerts
  rules:

  - alert: HighCPUUsage
    expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 80
    for: 30s
    labels:
      severity: warning
    annotations:
      summary: CPU usage high

  - alert: HighMemoryUsage
    expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 20
    for: 30s
    labels:
      severity: warning
    annotations:
      summary: Memory usage high

  - alert: HighLatency
    expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[1m])) > 1
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: Request latency high
